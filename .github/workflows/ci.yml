name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: ci / backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
      SECRET_KEY: ci-secret-key-32-chars-minimum-ok
      REFRESH_SECRET_KEY: ci-refresh-key-32-chars-minimum-ok
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_KEY: placeholder-service-key
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      ENVIRONMENT: test
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Lint (ruff)
        run: ruff check .
        working-directory: backend

      - name: Run migrations
        run: alembic upgrade head
        working-directory: backend

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=90
        working-directory: backend

      - name: Dependency audit
        run: pip install pip-audit pip-audit -r requirements.txt --ignore-vuln CVE-2025-71176 PYSEC-2024-232 PYSEC-2024-233 CVE-2025-54121 CVE-2025-62727
        working-directory: backend

  frontend:
    name: ci / frontend
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: web

      - name: Unit tests + coverage
        run: npm test -- --watchAll=false --coverage --coverageThreshold='{"global":{"lines":90}}'
        working-directory: web

      - name: Build verification
        run: npm run build
        working-directory: web

      - name: Dependency audit
        run: npm audit --audit-level=high
        working-directory: web
