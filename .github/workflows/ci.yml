name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: ci / backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Unit tests + coverage
        run: pytest backend/tests/ --cov=backend/app --cov-fail-under=90
        env:
          DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/dbname
          SECRET_KEY: ci-secret
          REFRESH_SECRET_KEY: ci-refresh-secret
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          ALLOWED_ORIGINS: '["http://localhost:3000"]'
          ENVIRONMENT: test
          SENTRY_DSN: ""

      - name: Dependency audit
        run: pip install pip-audit && pip-audit -r backend/requirements.txt

  frontend:
    name: ci / frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: web

      - name: Unit tests + coverage
        run: npm test -- --watchAll=false --coverage --coverageThreshold='{"global":{"lines":90}}'
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Dependency audit
        run: npm audit --audit-level=high
        working-directory: web
